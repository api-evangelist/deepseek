specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: DeepSeek
providerId: deepseek
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - AI
  - Artificial Intelligence
  - Chat
  - LLM
  - Large Language Models
  - Rate Limiting
description: DeepSeek does not publish fixed numerical rate limits. Instead, the API dynamically
  caps user concurrency based on current server load and returns HTTP 429 once a caller's concurrency
  ceiling is reached. There is no hard requests-per-minute or tokens-per-minute cap published on the
  public docs; sustained throughput is therefore best-effort and varies in real time. Inference
  connections that have not begun streaming within ten minutes of being accepted are closed by the
  server.
sources:
  - https://api-docs.deepseek.com/quick_start/rate_limit
  - https://api-docs.deepseek.com/quick_start/pricing
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Dynamic concurrency cap
    scope: api-key
    metric: concurrent_requests
    limit: dynamic — varies with current server load
    notes: DeepSeek throttles by concurrent in-flight requests rather than RPS. The exact ceiling
      is not published and shifts with load.
  - name: Inference connection timeout
    scope: connection
    metric: seconds_to_first_token
    limit: 600
    timeFrame: second
    notes: If inference does not start within 10 minutes after the connection is accepted, the
      server closes the connection. Affects very long queues during load spikes.
policies:
  - name: Backoff Strategy
    description: On HTTP 429, callers should back off and retry with exponential delay and jitter.
      DeepSeek does not document a Retry-After header, so clients must use their own retry budget.
  - name: Keep-Alive Signaling
    description: While a request is queued the server returns empty lines (non-streaming) or SSE
      keep-alive comments (streaming). Clients must tolerate these placeholder frames.
  - name: Connection Lifetime
    description: Drop and re-establish connections that have been idle for more than 10 minutes
      without any token output, since the server will close them.
  - name: Concurrency Sizing
    description: Because limits are dynamic, callers should target a configurable concurrency
      budget per API key and reduce parallelism when 429 responses spike.
