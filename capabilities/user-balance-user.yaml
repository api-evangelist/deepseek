naftiko: 1.0.0-alpha2
info:
  label: DeepSeek User Balance API — User
  description: 'DeepSeek User Balance API — User. 1 operations. Lead operation: DeepSeek Get User Balance. Self-contained
    Naftiko capability covering one Deepseek business surface.'
  tags:
  - Deepseek
  - User
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DEEPSEEK_API_KEY: DEEPSEEK_API_KEY
capability:
  consumes:
  - type: http
    namespace: user-balance-user
    baseUri: https://api.deepseek.com
    description: DeepSeek User Balance API — User business capability. Self-contained, no shared references.
    resources:
    - name: user-balance
      path: /user/balance
      operations:
      - name: getuserbalance
        method: GET
        description: DeepSeek Get User Balance
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.DEEPSEEK_API_KEY}}'
  exposes:
  - type: rest
    namespace: user-balance-user-rest
    port: 8080
    description: REST adapter for DeepSeek User Balance API — User. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/user/balance
      name: user-balance
      description: REST surface for user-balance.
      operations:
      - method: GET
        name: getuserbalance
        description: DeepSeek Get User Balance
        call: user-balance-user.getuserbalance
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: user-balance-user-mcp
    port: 9090
    transport: http
    description: MCP adapter for DeepSeek User Balance API — User. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: deepseek-get-user-balance
      description: DeepSeek Get User Balance
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: user-balance-user.getuserbalance
      outputParameters:
      - type: object
        mapping: $.
