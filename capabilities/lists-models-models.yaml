naftiko: 1.0.0-alpha2
info:
  label: DeepSeek Models API — Models
  description: 'DeepSeek Models API — Models. 1 operations. Lead operation: DeepSeek List Available Models. Self-contained
    Naftiko capability covering one Deepseek business surface.'
  tags:
  - Deepseek
  - Models
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DEEPSEEK_API_KEY: DEEPSEEK_API_KEY
capability:
  consumes:
  - type: http
    namespace: lists-models-models
    baseUri: https://api.deepseek.com
    description: DeepSeek Models API — Models business capability. Self-contained, no shared references.
    resources:
    - name: models
      path: /models
      operations:
      - name: listmodels
        method: GET
        description: DeepSeek List Available Models
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.DEEPSEEK_API_KEY}}'
  exposes:
  - type: rest
    namespace: lists-models-models-rest
    port: 8080
    description: REST adapter for DeepSeek Models API — Models. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/models
      name: models
      description: REST surface for models.
      operations:
      - method: GET
        name: listmodels
        description: DeepSeek List Available Models
        call: lists-models-models.listmodels
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: lists-models-models-mcp
    port: 9090
    transport: http
    description: MCP adapter for DeepSeek Models API — Models. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: deepseek-list-available-models
      description: DeepSeek List Available Models
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: lists-models-models.listmodels
      outputParameters:
      - type: object
        mapping: $.
