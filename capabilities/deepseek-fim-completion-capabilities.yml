name: DeepSeek FIM Completion API Capabilities
description: >-
  Capabilities exposed by the DeepSeek Fill-In-The-Middle (FIM) Completion
  beta API for code-completion-style generation given a prompt and optional
  suffix.
capabilities:
  - name: Create FIM Completion
    description: Generate text that fills the gap between a prompt and an optional suffix.
    operationId: createFimCompletion
    method: POST
    path: /completions
use_cases:
  - name: Inline code completion
    description: Power IDE-style code completions where a prefix and suffix are known.
  - name: Document infill
    description: Generate text that fits between two known sections of a document.
  - name: Templated content generation
    description: Fill in templated content with model-generated text bounded by fixed wrappers.
